services:
  # Service with auth and workspace mounts
  claude-auth-workspace:
    build:
      context: ${CONTEXT}
      dockerfile: ${CLAUDE_CONTAINER_DIR}/Dockerfile.claude
    stdin_open: true
    tty: true
    userns_mode: keep-id
    #profiles:
    # Check this
    #- auth-workspace
    volumes:
      - ${CLAUDE_CONFIG_DIR:-~}/.claude.json:/home/node/.claude.json
      - ${CLAUDE_CONFIG_DIR:-~}/.claude:/home/node/.claude
      - ${CONTEXT}:/workspace
    working_dir: /workspace
